name: CloudRax Guard Scan

on:
  pull_request:
    paths:
      - "**/*.tf"
      - "**/*.py"
      - "policies/**/*.rego"
      - "exceptions.yaml"
      - "guardrail-config.yaml"
      - ".github/workflows/scan.yml"
  push:
    branches:
      - main
      - master

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x opa
          sudo mv opa /usr/local/bin/opa
          opa version

      - name: Install CloudRax Guard
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Scan secure examples in enforce mode
        run: cloudrax-guard scan examples/secure

      - name: Scan insecure examples in dry-run mode
        run: cloudrax-guard scan examples/insecure --dry-run
